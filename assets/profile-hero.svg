<svg width="1100" height="520" viewBox="0 0 1100 520" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Wangkang profile hero</title>
  <desc id="desc">Animated profile banner for Wangkang, a PhD student researching embodied intelligence, AI agents, and AI for urban safety.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1100" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#07111F"/>
      <stop offset="0.52" stop-color="#0B1020"/>
      <stop offset="1" stop-color="#101827"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="80" x2="980" y2="430" gradientUnits="userSpaceOnUse">
      <stop stop-color="#58A6FF"/>
      <stop offset="0.5" stop-color="#2DD4BF"/>
      <stop offset="1" stop-color="#A78BFA"/>
    </linearGradient>
    <radialGradient id="glowA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(210 140) rotate(56) scale(260 190)">
      <stop stop-color="#58A6FF" stop-opacity="0.38"/>
      <stop offset="1" stop-color="#58A6FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(880 370) rotate(133) scale(270 170)">
      <stop stop-color="#2DD4BF" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#2DD4BF" stop-opacity="0"/>
    </radialGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="0 0 0 0 0.35 0 0 0 0 0.65 0 0 0 0 1 0 0 0 0.6 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M 44 0 L 0 0 0 44" stroke="#A5B4FC" stroke-opacity="0.085" stroke-width="1"/>
    </pattern>
    <clipPath id="frameClip">
      <rect x="26" y="26" width="1048" height="468" rx="26"/>
    </clipPath>
    <style>
      .font { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; }
      .mono { font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, monospace; }
      .muted { fill: #9CA3AF; }
      .body { fill: #CBD5E1; }
      .title { fill: #F8FAFC; font-size: 58px; font-weight: 800; letter-spacing: 0; }
      .subtitle { fill: #CBD5E1; font-size: 21px; font-weight: 500; letter-spacing: 0; }
      .eyebrow { fill: #67E8F9; font-size: 13px; font-weight: 700; letter-spacing: 2.6px; }
      .label { fill: #E5E7EB; font-size: 18px; font-weight: 800; letter-spacing: 0; }
      .small { fill: #94A3B8; font-size: 13px; font-weight: 600; letter-spacing: 0; }
      .cardBody { fill: #CBD5E1; font-size: 14px; font-weight: 500; letter-spacing: 0; }
      .fadeIn { opacity: 0; animation: fadeIn 700ms ease-out forwards; }
      .slideIn { opacity: 0; transform: translateY(12px); animation: slideIn 700ms ease-out forwards; }
      .pulse { animation: pulse 2.8s ease-in-out infinite; }
      .floatA { animation: floatA 8s ease-in-out infinite; }
      .floatB { animation: floatB 9s ease-in-out infinite; }
      .scan { animation: scan 5.2s ease-in-out infinite; }
      .dash { stroke-dasharray: 9 14; animation: dash 10s linear infinite; }
      .delay1 { animation-delay: 180ms; }
      .delay2 { animation-delay: 380ms; }
      .delay3 { animation-delay: 620ms; }
      .delay4 { animation-delay: 860ms; }
      .delay5 { animation-delay: 1080ms; }
      @keyframes fadeIn { to { opacity: 1; } }
      @keyframes slideIn { to { opacity: 1; transform: translateY(0); } }
      @keyframes pulse { 0%,100% { opacity: .42; } 50% { opacity: .95; } }
      @keyframes floatA { 0%,100% { transform: translate(0,0); } 50% { transform: translate(14px,-10px); } }
      @keyframes floatB { 0%,100% { transform: translate(0,0); } 50% { transform: translate(-12px,10px); } }
      @keyframes scan { 0%,100% { transform: translateY(-120px); opacity: 0; } 20%,70% { opacity: .42; } 90% { transform: translateY(450px); opacity: 0; } }
      @keyframes dash { to { stroke-dashoffset: -230; } }
      @media (prefers-reduced-motion: reduce) {
        .fadeIn, .slideIn, .pulse, .floatA, .floatB, .scan, .dash { animation: none; opacity: 1; transform: none; }
      }
    </style>
  </defs>

  <rect width="1100" height="520" rx="30" fill="url(#bg)"/>
  <rect width="1100" height="520" rx="30" fill="url(#glowA)"/>
  <rect width="1100" height="520" rx="30" fill="url(#glowB)"/>
  <rect x="26" y="26" width="1048" height="468" rx="26" fill="url(#grid)"/>
  <g clip-path="url(#frameClip)">
    <rect class="scan" x="26" y="30" width="1048" height="72" fill="url(#accent)" opacity="0.16"/>
    <g class="floatA">
      <circle cx="890" cy="108" r="4" fill="#67E8F9"/>
      <circle cx="944" cy="146" r="3" fill="#A78BFA"/>
      <circle cx="986" cy="96" r="3" fill="#58A6FF"/>
      <path class="dash" d="M890 108 C920 126 927 136 944 146 C961 124 971 108 986 96" stroke="#67E8F9" stroke-opacity="0.46" stroke-width="1.5" fill="none"/>
    </g>
    <g class="floatB">
      <circle cx="116" cy="410" r="3" fill="#2DD4BF"/>
      <circle cx="182" cy="386" r="4" fill="#58A6FF"/>
      <circle cx="242" cy="430" r="3" fill="#A78BFA"/>
      <path class="dash" d="M116 410 C146 392 160 386 182 386 C207 404 220 418 242 430" stroke="#58A6FF" stroke-opacity="0.42" stroke-width="1.5" fill="none"/>
    </g>
  </g>

  <rect x="26" y="26" width="1048" height="468" rx="26" stroke="url(#accent)" stroke-opacity="0.42"/>
  <path d="M66 78 H188" stroke="url(#accent)" stroke-width="3" stroke-linecap="round" filter="url(#softGlow)"/>

  <g class="fadeIn">
    <text x="66" y="118" class="font eyebrow">AI RESEARCH PROFILE</text>
    <text x="66" y="184" class="font title">Wangkang</text>
    <text x="66" y="222" class="font subtitle">PhD Student · Embodied Intelligence · AI Agents · AI for Urban Safety</text>
  </g>

  <g class="slideIn delay2">
    <rect x="66" y="268" width="520" height="142" rx="18" fill="#0F172A" fill-opacity="0.74" stroke="#334155"/>
    <rect x="86" y="288" width="7" height="28" rx="3.5" fill="#2DD4BF"/>
    <text x="108" y="309" class="font label">About Me</text>
    <text x="88" y="346" class="font cardBody">PhD student at Chongqing Artificial Intelligence Institute,</text>
    <text x="88" y="374" class="font cardBody">exploring how intelligent agents perceive, reason, and act</text>
    <text x="88" y="402" class="font cardBody">across real-world environments and safety-critical scenarios.</text>
  </g>

  <g class="slideIn delay3">
    <rect x="626" y="268" width="128" height="142" rx="18" fill="#111827" fill-opacity="0.76" stroke="#1D4ED8"/>
    <circle class="pulse" cx="650" cy="296" r="7" fill="#58A6FF"/>
    <text x="646" y="336" class="font label" font-size="16">Embodied</text>
    <text x="646" y="359" class="font label" font-size="16">Intelligence</text>
    <text x="646" y="390" class="font small">Perception</text>
  </g>
  <g class="slideIn delay4">
    <rect x="774" y="268" width="128" height="142" rx="18" fill="#111827" fill-opacity="0.76" stroke="#0F766E"/>
    <circle class="pulse" cx="798" cy="296" r="7" fill="#2DD4BF"/>
    <text x="794" y="336" class="font label" font-size="16">AI Agent</text>
    <text x="794" y="359" class="font label" font-size="16">Apps</text>
    <text x="794" y="390" class="font small">Autonomy</text>
  </g>
  <g class="slideIn delay5">
    <rect x="922" y="268" width="112" height="142" rx="18" fill="#111827" fill-opacity="0.76" stroke="#7C3AED"/>
    <circle class="pulse" cx="946" cy="296" r="7" fill="#A78BFA"/>
    <text x="942" y="336" class="font label" font-size="16">Urban</text>
    <text x="942" y="359" class="font label" font-size="16">Safety</text>
    <text x="942" y="390" class="font small">Risk AI</text>
  </g>

  <g class="fadeIn delay5">
    <text x="66" y="458" class="mono muted" font-size="13">research_focus = ["embodied-ai", "agentic-systems", "ai-for-urban-safety"]</text>
    <path d="M762 454 H1034" stroke="url(#accent)" stroke-opacity="0.52" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>
